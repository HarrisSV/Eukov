services:
  postgres:
    image: postgres:16-alpine
    container_name: eukov-postgres
    environment:
      POSTGRES_USER: eukov
      POSTGRES_PASSWORD: eukov_secret
      POSTGRES_DB: eukov
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eukov -d eukov"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: eukov-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path=/migrations",
        "-database=postgres://eukov:eukov_secret@postgres:5432/eukov?sslmode=disable",
        "up",
      ]
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eukov-backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://eukov:eukov_secret@postgres:5432/eukov?sslmode=disable
      BACKEND_PORT: "8080"
      UPLOAD_BASE_PATH: /app/uploads
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-key-32chars-minimum!}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@eukov.local}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-change-me-super-admin-password}
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eukov-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_GOOGLE_API_KEY: ${NEXT_PUBLIC_GOOGLE_API_KEY:-}
      NEXT_PUBLIC_GOOGLE_APP_ID: ${NEXT_PUBLIC_GOOGLE_APP_ID:-}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eukov
          POSTGRES_PASSWORD: eukov_secret
          POSTGRES_DB: eukov
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eukov -d eukov"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Backend lint
        run: go vet ./...

      - name: Run migrations up
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/backend/migrations:/migrations \
            migrate/migrate:v4.18.1 \
            -path=/migrations \
            -database="postgres://eukov:eukov_secret@localhost:5432/eukov?sslmode=disable" up

      - name: Run migrations down and re-up
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/backend/migrations:/migrations \
            migrate/migrate:v4.18.1 \
            -path=/migrations \
            -database="postgres://eukov:eukov_secret@localhost:5432/eukov?sslmode=disable" down -all
          docker run --rm --network host \
            -v ${{ github.workspace }}/backend/migrations:/migrations \
            migrate/migrate:v4.18.1 \
            -path=/migrations \
            -database="postgres://eukov:eukov_secret@localhost:5432/eukov?sslmode=disable" up

      - name: Backend tests
        env:
          DATABASE_URL: postgres://eukov:eukov_secret@localhost:5432/eukov?sslmode=disable
        run: |
          go test ./internal/... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//' | awk '{if ($1 < 85) {print "Backend coverage below 85%:", $1"%"; exit 1}}'

      - name: Integration tests
        env:
          DATABASE_URL: postgres://eukov:eukov_secret@localhost:5432/eukov?sslmode=disable
        run: go test ./tests/...

      - name: Backend build
        run: go build ./cmd/server

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        env:
          DATABASE_URL: postgres://eukov:eukov_secret@localhost:5432/eukov?sslmode=disable
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
        run: |
          cd ../backend && go run ./cmd/server &
          BACKEND_PID=$!
          cd ../frontend
          npx playwright test
          kill $BACKEND_PID
